# Publish container image to a private registry over Tailscale (HTTPS variant).
#
# Use this when your registry presents a Tailscale-issued Let's Encrypt
# cert — typically via `tailscale serve` on the registry host, or a reverse
# proxy (Caddy, Traefik) that fronts the registry with a cert from
# `tailscale cert <host>.<tailnet>.ts.net`.
#
# If the registry only speaks plain HTTP, use publish-to-tailscale-registry-http.yml
# instead — it sets `insecure-registries` on the runner so Docker accepts the
# unencrypted push (safe inside the WireGuard tunnel).
#
# Drop the `publish` job below into your existing CI workflow, or copy this
# whole file to .github/workflows/publish.yml.
#
# Before this works, complete the one-time setup in
# docs/publish-to-tailscale-registry.md:
#   1. Define `tag:ci` in your Tailscale ACL
#   2. Create an OAuth client with `auth_keys` Write scope and tag `tag:ci`
#   3. Add four secrets to the repo:
#        TAILSCALE_OAUTH_CLIENT_ID
#        TAILSCALE_OAUTH_CLIENT_SECRET
#        REGISTRY_USERNAME
#        REGISTRY_PASSWORD
#   4. Provision a Tailscale-issued cert on the registry host and arrange
#      for renewal — see "HTTPS-only setup" in the doc
#
# Then change two things below to match your setup:
#   - REGISTRY_HOST  — replace `nas.your-tailnet.ts.net` with your registry's
#                      MagicDNS hostname (no port if serving on 443; include
#                      the port if not, e.g. `nas.your-tailnet.ts.net:5000`)
#   - IMAGE_NAME     — replace `your-image-name` with the image to publish
#
# If dropping into an existing workflow, also adjust:
#   - `needs:` to match your lint/typecheck/test job names
#   - `working-directory` and the build context path

name: publish

on:
  push:
    branches: [main]

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Bring the runner up as an ephemeral, tagged node on the tailnet.
      # Note: the input is `oauth-secret`, not `oauth-client-secret`.
      - uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      # No insecure-registries hack: the registry presents a real Let's Encrypt
      # cert via Tailscale, which the runner trusts via the system CA bundle.
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: nas.your-tailnet.ts.net
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # Tag with CalVer (YYYY.MM.DD-<sha7>) derived from the commit timestamp so
      # the tag is stable if the job is re-run on a later date.
      - name: Generate CalVer tag
        id: calver
        run: |
          commit_date="$(TZ=UTC git show -s --format=%cd --date=format-local:%Y.%m.%d "$GITHUB_SHA")"
          echo "tag=${commit_date}-$(echo "$GITHUB_SHA" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: |
            nas.your-tailnet.ts.net/your-image-name:latest
            nas.your-tailnet.ts.net/your-image-name:${{ steps.calver.outputs.tag }}
